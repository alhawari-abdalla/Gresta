<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browse games by gresta — play on itch.io." />
    <title>Games — gresta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Orbitron:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Orbitron", "system-ui", "sans-serif"],
              sans: ["DM Sans", "system-ui", "sans-serif"],
            },
            colors: {
              void: "#07070c",
              mist: "#0f1119",
            },
            backgroundImage: {
              "grid-fade":
                "linear-gradient(to bottom, rgba(7,7,12,0.2), rgba(7,7,12,0.95)), linear-gradient(rgba(217,70,239,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(217,70,239,0.07) 1px, transparent 1px)",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #07070c;
      }
      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .game-card.animate-in {
        animation: fade-up 0.55s ease forwards;
      }
    </style>
  </head>
  <body class="min-h-screen font-sans text-zinc-300 antialiased">
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div class="absolute left-1/4 top-1/3 h-[400px] w-[400px] rounded-full bg-fuchsia-600/12 blur-[100px]"></div>
      <div class="absolute bottom-0 right-1/4 h-[360px] w-[360px] rounded-full bg-cyan-500/10 blur-[100px]"></div>
      <div class="absolute inset-0 bg-[length:48px_48px] bg-grid-fade opacity-90" style="background-size: 48px 48px, 48px 48px, 48px 48px"></div>
    </div>

    <header class="sticky top-0 z-50 border-b border-white/5 bg-void/80 backdrop-blur-xl">
      <nav class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8" aria-label="Main">
        <a href="index.html" class="group flex items-center gap-2">
          <span class="flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br from-cyan-400 to-fuchsia-600 font-display text-sm font-bold text-white shadow-lg shadow-fuchsia-900/40 transition group-hover:scale-105">G</span>
          <span class="font-display text-lg font-semibold tracking-wide text-white">gresta</span>
        </a>
        <ul class="flex items-center gap-1 sm:gap-2">
          <li>
            <a href="index.html" class="rounded-lg px-3 py-2 text-sm font-medium text-zinc-400 transition hover:bg-white/5 hover:text-white">Home</a>
          </li>
          <li>
            <a href="games.html" class="rounded-lg px-3 py-2 text-sm font-medium text-white transition hover:bg-white/5" aria-current="page">Games</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="px-4 py-16 sm:px-6 sm:py-20 lg:px-8">
      <div class="mx-auto max-w-6xl">
        <header class="mb-14 max-w-2xl">
          <p class="mb-3 text-xs font-semibold uppercase tracking-[0.25em] text-fuchsia-400/90">Catalog</p>
          <h1 class="font-display text-4xl font-bold tracking-tight text-white sm:text-5xl">Games</h1>
          <p class="mt-4 text-lg leading-relaxed text-zinc-400">Every project is crafted for clarity, feel, and replay value. Click through to play on itch.io.</p>
        </header>
        <div id="games-grid" class="grid gap-10 md:grid-cols-2"></div>
      </div>
    </main>

    <footer class="border-t border-white/5 bg-void/90 px-4 py-12 sm:px-6 lg:px-8">
      <div class="mx-auto flex max-w-6xl flex-col items-center justify-between gap-6 sm:flex-row">
        <div class="flex items-center gap-2">
          <span class="flex h-8 w-8 items-center justify-center rounded-md bg-gradient-to-br from-cyan-400 to-fuchsia-600 font-display text-xs font-bold text-white">G</span>
          <span class="font-display text-sm font-semibold text-white">gresta</span>
        </div>
        <p class="text-center text-sm text-zinc-500">&copy; <span id="year"></span> gresta. Built with HTML, Tailwind &amp; JS.</p>
        <div class="flex gap-4 text-sm text-zinc-400">
          <a href="index.html" class="transition hover:text-white">Home</a>
          <a href="games.html" class="transition hover:text-white">Games</a>
        </div>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
    <script src="js/games-data.js"></script>
    <script src="js/games-page.js"></script>
  </body>
</html>
