<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Games by gresta — premium indie titles on itch.io." />
    <title>Games — gresta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Outfit", "system-ui", "sans-serif"],
              sans: ["DM Sans", "system-ui", "sans-serif"],
            },
            colors: {
              void: "#050505",
              mist: "#0c0c0c",
              gold: {
                DEFAULT: "#D4AF37",
                bright: "#E8C84B",
                deep: "#8A6F1F",
              },
            },
            boxShadow: {
              gold: "0 0 40px -8px rgba(212, 175, 55, 0.45)",
              "gold-lg": "0 0 60px -10px rgba(212, 175, 55, 0.55)",
            },
            backgroundImage: {
              "lux-grid":
                "linear-gradient(to bottom, rgba(5,5,5,0.4), rgba(5,5,5,0.92)), linear-gradient(rgba(212,175,55,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(212,175,55,0.06) 1px, transparent 1px)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/gresta.css" />
    <style>
      .game-card {
        opacity: 0;
        transform: translateY(16px);
      }
    </style>
  </head>
  <body class="min-h-screen bg-void font-sans text-zinc-300 antialiased">
    <div id="parallax-glow" class="pointer-events-none fixed inset-0 -z-10 transition-transform duration-700 ease-out will-change-transform">
      <div class="absolute right-0 top-0 h-[min(65vh,480px)] w-[min(85vw,640px)] translate-x-1/4 rounded-full bg-[radial-gradient(ellipse_at_center,rgba(212,175,55,0.18)_0%,transparent_65%)] blur-3xl"></div>
      <div class="absolute bottom-0 left-0 h-72 w-72 -translate-x-1/4 rounded-full bg-[radial-gradient(circle_at_center,rgba(12,25,41,0.45),transparent_70%)] blur-3xl"></div>
    </div>
    <div
      class="pointer-events-none fixed inset-0 -z-10 bg-[length:56px_56px] bg-lux-grid opacity-[0.85]"
      style="background-size: 56px 56px, 56px 56px, 56px 56px"
    ></div>

    <header class="site-header sticky top-0 z-50 border-b border-white/[0.06] bg-void/75 backdrop-blur-xl backdrop-saturate-150">
      <nav class="mx-auto flex max-w-6xl items-center justify-between gap-6 px-4 py-3.5 sm:px-6 lg:px-8" aria-label="Main">
        <a href="index.html" class="flex items-center gap-3 transition hover:opacity-90">
          <img src="assets/gresta-logo.png" alt="gresta" width="180" height="56" class="h-10 w-auto sm:h-11" />
        </a>
        <ul class="flex items-center gap-1 sm:gap-2">
          <li>
            <a href="index.html" class="rounded-2xl px-4 py-2 text-sm font-medium text-zinc-400 transition hover:bg-white/[0.06] hover:text-white">Home</a>
          </li>
          <li>
            <a
              href="games.html"
              class="rounded-2xl px-4 py-2 text-sm font-medium text-white transition hover:bg-white/[0.06]"
              aria-current="page"
              >Games</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main class="px-4 py-16 sm:px-6 sm:py-20 lg:px-8">
      <div class="mx-auto max-w-6xl">
        <header class="mb-14 max-w-2xl">
          <p class="text-xs font-semibold uppercase tracking-[0.35em] text-[#D4AF37]/90">Library</p>
          <h1 class="mt-3 font-display text-4xl font-semibold tracking-tight text-white sm:text-5xl">Games</h1>
          <p class="mt-4 text-lg leading-relaxed text-zinc-400">Curated releases with a focus on atmosphere, feel, and replayability.</p>
        </header>
        <div id="games-grid" class="grid gap-10 md:grid-cols-2"></div>
      </div>
    </main>

    <footer class="border-t border-white/[0.06] bg-void px-4 py-10 sm:px-6 lg:px-8">
      <div class="mx-auto max-w-6xl text-center">
        <p class="text-sm text-zinc-500">&copy; gresta - All rights reserved</p>
      </div>
    </footer>

    <script src="js/site.js"></script>
    <script src="js/games-data.js"></script>
    <script src="js/games-page.js"></script>
  </body>
</html>
