<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="gresta — Premium game development studio. Immersive worlds, refined mechanics." />
    <title>gresta — Premium Game Development Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Outfit", "system-ui", "sans-serif"],
              sans: ["DM Sans", "system-ui", "sans-serif"],
            },
            colors: {
              void: "#050505",
              mist: "#0c0c0c",
              gold: {
                DEFAULT: "#D4AF37",
                bright: "#E8C84B",
                deep: "#8A6F1F",
                dim: "rgba(212, 175, 55, 0.12)",
              },
              navy: "#0C1929",
            },
            boxShadow: {
              gold: "0 0 40px -8px rgba(212, 175, 55, 0.45)",
              "gold-lg": "0 0 60px -10px rgba(212, 175, 55, 0.55)",
            },
            backgroundImage: {
              "lux-grid":
                "linear-gradient(to bottom, rgba(5,5,5,0.4), rgba(5,5,5,0.92)), linear-gradient(rgba(212,175,55,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(212,175,55,0.06) 1px, transparent 1px)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/gresta.css" />
  </head>
  <body class="min-h-screen bg-void font-sans text-zinc-300 antialiased">
    <!-- Ambient gold glow (subtle parallax via site.js) -->
    <div id="parallax-glow" class="pointer-events-none fixed inset-0 -z-10 transition-transform duration-700 ease-out will-change-transform">
      <div class="absolute left-1/2 top-[12%] h-[min(70vh,520px)] w-[min(90vw,780px)] -translate-x-1/2 rounded-full bg-[radial-gradient(ellipse_at_center,rgba(212,175,55,0.22)_0%,transparent_68%)] blur-3xl"></div>
      <div class="absolute -bottom-32 left-1/4 h-80 w-80 rounded-full bg-[radial-gradient(circle_at_center,rgba(212,175,55,0.08),transparent_70%)] blur-3xl"></div>
      <div class="absolute -right-20 top-1/3 h-72 w-72 rounded-full bg-[radial-gradient(circle_at_center,rgba(12,25,41,0.5),transparent_70%)] blur-3xl"></div>
    </div>
    <div
      class="pointer-events-none fixed inset-0 -z-10 bg-[length:56px_56px] bg-lux-grid opacity-[0.85]"
      style="background-size: 56px 56px, 56px 56px, 56px 56px"
    ></div>

    <header class="site-header sticky top-0 z-50 border-b border-white/[0.06] bg-void/75 backdrop-blur-xl backdrop-saturate-150">
      <nav class="mx-auto flex max-w-6xl items-center justify-between gap-6 px-4 py-3.5 sm:px-6 lg:px-8" aria-label="Main">
        <a href="index.html" class="flex items-center gap-3 transition hover:opacity-90">
          <img src="assets/gresta-logo.png" alt="gresta" width="180" height="56" class="h-10 w-auto sm:h-11" />
        </a>
        <ul class="flex items-center gap-1 sm:gap-2">
          <li>
            <a
              href="index.html"
              class="rounded-2xl px-4 py-2 text-sm font-medium text-white transition hover:bg-white/[0.06]"
              aria-current="page"
              >Home</a
            >
          </li>
          <li>
            <a
              href="games.html"
              class="rounded-2xl px-4 py-2 text-sm font-medium text-zinc-400 transition hover:bg-white/[0.06] hover:text-white"
              >Games</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <!-- Hero -->
      <section class="relative overflow-hidden px-4 pb-24 pt-10 sm:px-6 sm:pb-32 sm:pt-14 lg:px-8">
        <div class="mx-auto flex max-w-4xl flex-col items-center text-center">
          <div class="logo-with-reflect relative mb-8 w-full max-w-xl px-4 sm:max-w-2xl">
            <div class="drop-shadow-[0_25px_60px_rgba(212,175,55,0.22)]">
              <img
                src="assets/gresta-logo.png"
                alt="gresta logo"
                width="720"
                height="240"
                style="border-radius: 10px;"
                class="mx-auto h-auto w-full max-w-md object-contain sm:max-w-lg"
                fetchpriority="high"
              />
            </div>
            

          <h1 class="font-display text-5xl font-semibold tracking-tight text-white sm:text-6xl md:text-7xl">
            <span class="bg-gradient-to-b from-white via-[#f5e6b8] to-[#D4AF37] bg-clip-text text-transparent">gresta</span>
          </h1>
          <p class="mt-4 max-w-xl text-lg font-medium text-zinc-400 sm:text-xl">Premium Game Development Studio</p>
          <div class="mt-10">
            <a
              href="games.html"
              class="group inline-flex items-center justify-center gap-2 rounded-2xl bg-gradient-to-b from-[#E8C84B] via-[#D4AF37] to-[#9e7e26] px-10 py-3.5 text-sm font-bold uppercase tracking-[0.2em] text-void shadow-gold transition duration-300 hover:scale-[1.035] hover:shadow-gold-lg focus:outline-none focus:ring-2 focus:ring-[#D4AF37]/70 focus:ring-offset-2 focus:ring-offset-void"
            >
              Explore Games
              <svg class="h-4 w-4 transition group-hover:translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6" />
              </svg>
            </a>
          </div>
        </div>
      </section>

      <!-- Featured games -->
      <section class="border-t border-white/[0.06] bg-gradient-to-b from-mist/80 to-void px-4 py-20 sm:px-6 lg:px-8" aria-labelledby="featured-heading">
        <div class="mx-auto max-w-6xl">
          <div class="mb-14 flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.35em] text-[#D4AF37]/90">Spotlight</p>
              <h2 id="featured-heading" class="mt-2 font-display text-3xl font-semibold text-white sm:text-4xl">Featured games</h2>
              <p class="mt-3 max-w-lg text-zinc-400">Hand-picked experiences — each opens itch.io in a new tab.</p>
            </div>
            <a
              href="games.html"
              class="inline-flex items-center gap-2 rounded-2xl border border-[#D4AF37]/25 bg-white/[0.03] px-4 py-2 text-sm font-semibold text-[#E8C84B] shadow-sm shadow-black/40 backdrop-blur-sm transition hover:border-[#D4AF37]/45 hover:bg-white/[0.05]"
            >
              View catalog
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </a>
          </div>
          <div id="featured-games" class="grid gap-8 md:grid-cols-2 lg:grid-cols-3"></div>
        </div>
      </section>
    </main>

    <footer class="border-t border-white/[0.06] bg-void px-4 py-10 sm:px-6 lg:px-8">
      <div class="mx-auto max-w-6xl text-center">
        <p class="text-sm text-zinc-500">&copy; gresta - All rights reserved</p>
      </div>
    </footer>

    <script src="js/site.js"></script>
    <script src="js/games-data.js"></script>
    <script src="js/home.js"></script>
  </body>
</html>
